      <path d="M6 19h36M19 8v32" stroke="#63d5ff" stroke-width="4" stroke-linecap="round"/>
      <rect x="10" y="12" width="7" height="5" rx="1" fill="#63d5ff"/>
    </symbol>
  </defs>

