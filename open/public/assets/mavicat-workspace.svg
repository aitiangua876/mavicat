  <rect x="612" y="288" width="1000" height="440" fill="url(#editor)"/>
  <g font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="25" font-weight="800">
    <text x="652" y="338" fill="#8892a4">1</text>
    <text x="714" y="338" fill="#ff6680">SELECT</text>
    <text x="816" y="338" fill="#e7edf5">o.id, o.order_no, c.name, o.total_amount</text>
    <text x="652" y="386" fill="#8892a4">2</text>
    <text x="714" y="386" fill="#ff6680">FROM</text>
    <text x="786" y="386" fill="#78b7ff">orders</text>
    <text x="882" y="386" fill="#e7edf5">o</text>
    <text x="652" y="434" fill="#8892a4">3</text>
    <text x="714" y="434" fill="#ff6680">JOIN</text>
    <text x="786" y="434" fill="#78b7ff">customers</text>
    <text x="930" y="434" fill="#e7edf5">c ON c.id = o.customer_id</text>
    <text x="652" y="482" fill="#8892a4">4</text>
    <text x="714" y="482" fill="#ff6680">WHERE</text>
    <text x="806" y="482" fill="#e7edf5">o.status = </text>
    <text x="980" y="482" fill="#ffb86b">'paid'</text>
    <text x="652" y="530" fill="#8892a4">5</text>
    <text x="714" y="530" fill="#ff6680">ORDER BY</text>
    <text x="850" y="530" fill="#e7edf5">o.created_at DESC</text>
    <text x="652" y="578" fill="#8892a4">6</text>
    <text x="714" y="578" fill="#ff6680">LIMIT</text>
    <text x="800" y="578" fill="#8df0a8">50</text>
  </g>

