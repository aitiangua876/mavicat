<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1216" role="img" aria-labelledby="title desc">
  <title id="title">Mavicat latest workspace preview</title>
  <desc id="desc">A sanitized Mavicat desktop database workspace preview with demo connections, demo tables, SQL editor, result grid, and AI assistant panel.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset=".5" stop-color="#edf6ff"/>
      <stop offset="1" stop-color="#eaf3ff"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" x2="1">
      <stop offset="0" stop-color="#34373b"/>
      <stop offset="1" stop-color="#2d3034"/>
    </linearGradient>
    <linearGradient id="toolbar" x1="0" x2="1">
      <stop offset="0" stop-color="#3f4348"/>
      <stop offset="1" stop-color="#393d42"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#282b30"/>
      <stop offset="1" stop-color="#202328"/>
    </linearGradient>
    <linearGradient id="editor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#24282e"/>
      <stop offset="1" stop-color="#1f2227"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#53c7ff"/>
      <stop offset=".5" stop-color="#1577f2"/>
      <stop offset="1" stop-color="#0b4cc8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffd765"/>
      <stop offset=".55" stop-color="#ff9d18"/>
      <stop offset="1" stop-color="#f06b00"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7df070"/>
      <stop offset="1" stop-color="#21b55b"/>
    </linearGradient>
    <linearGradient id="select" x1="0" x2="1">
      <stop offset="0" stop-color="#1c6fe8"/>
      <stop offset="1" stop-color="#0e8bff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="38" flood-color="#142033" flood-opacity=".26"/>
    </filter>
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
