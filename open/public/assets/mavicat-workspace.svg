    </symbol>
    <symbol id="table" viewBox="0 0 64 64">
      <rect x="9" y="12" width="46" height="40" rx="7" fill="#dff7ff"/>
      <rect x="9" y="12" width="46" height="12" rx="7" fill="#1688e8"/>
      <path d="M9 24h46M22 24v28M39 24v28" stroke="#9ddff8" stroke-width="3"/>
    </symbol>
    <symbol id="doc" viewBox="0 0 64 64">
