<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1216" role="img" aria-labelledby="title desc">
  <title id="title">Mavicat database object workspace</title>
  <desc id="desc">A modern dark Mavicat database management workspace showing connection navigation, object search, table cards, and brand blue orange accents.</desc>
  <defs>
    <linearGradient id="window" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#30343b"/>
      <stop offset=".45" stop-color="#24272d"/>
      <stop offset="1" stop-color="#171a1f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#272b31"/>
      <stop offset="1" stop-color="#1d2025"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f7cff"/>
      <stop offset=".48" stop-color="#42b7ff"/>
      <stop offset="1" stop-color="#ff8a18"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" x2="1">
      <stop offset="0" stop-color="#0f7cff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ff8a18" stop-opacity=".16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="42" flood-color="#02040a" flood-opacity=".55"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <symbol id="dbIcon" viewBox="0 0 32 32">
      <ellipse cx="16" cy="8" rx="11" ry="5" fill="#47d36f"/>
      <path d="M5 8v14c0 3 5 6 11 6s11-3 11-6V8" fill="#31b857"/>
      <path d="M5 15c0 3 5 6 11 6s11-3 11-6" fill="none" stroke="#83f39c" stroke-width="2"/>
      <path d="M5 22c0 3 5 6 11 6s11-3 11-6" fill="none" stroke="#83f39c" stroke-width="2"/>
    </symbol>
    <symbol id="tableIcon" viewBox="0 0 48 48">
